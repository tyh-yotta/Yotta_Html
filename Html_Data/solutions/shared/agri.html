<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧農業溫室控制解決方案</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="../../css/index.css">
    
    <style>
        body {
            background-color: var(--bg-page);
            padding: 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .solution-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .solution-header .icon {
            font-size: 42px;
            color: #10b981;
        }
        .solution-title {
            color: var(--primary-color);
            margin: 0;
            font-size: 32px;
        }
        .solution-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .solution-content > p {
            line-height: 1.8;
            color: var(--text-main);
            margin-bottom: 20px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .solution-list {
            margin-left: 20px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .solution-list li {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 0.9rem;
        }
        .solution-img-wrapper {
            background: var(--bg-page);
            padding: 30px;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px dashed var(--border-color);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .solution-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    
    <div class="solution-header">
        <span class="material-symbols-outlined icon">eco</span>
        <h1 class="solution-title">智慧農業溫室控制解決方案</h1>
    </div>
    
    <div class="solution-content">
        <p>現代農業面臨氣候變遷與人力短缺的挑戰。透過導入我們的遠端 I/O 模組，農民可以將傳統溫室升級為智慧化環境。系統能夠精準採集空氣溫濕度、土壤水分、光照度與 CO2 濃度，並根據作物生長需求自動調節環境。</p>
        
        <p><strong>主要應用優勢：</strong></p>
        <ul class="solution-list">
            <li><strong>環境最佳化：</strong> 自動控制遮陽網、通風扇與降溫水簾，為農作物提供最完美的生長環境。</li>
            <li><strong>智慧灌溉滴灌：</strong> 根據土壤濕度自動啟動幫浦與電磁閥，節省水資源並提高作物產量。</li>
            <li><strong>無縫擴充：</strong> 支援分散式佈線，即使是佔地廣大的農場，也能透過網路輕鬆串聯各區域的控制節點。</li>
        </ul>
        
        <div class="solution-img-wrapper">
            <!-- 這裡先用產品預設圖代替解決方案情境圖 -->
            <img src="../../assets/product.png" alt="智慧農業示意圖" class="solution-img">
        </div>
    </div>

</body>
</html>
